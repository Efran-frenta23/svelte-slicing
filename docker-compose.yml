services:
  postgres:
    image: postgres:16-alpine
    container_name: autopulse_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: efran123
      POSTGRES_PASSWORD: abilahab
      POSTGRES_DB: autopulse
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U efran123 -d autopulse"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autopulse_network

  redis:
    image: redis:7-alpine
    container_name: autopulse_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret_password}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autopulse_network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: autopulse_redis_ui
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379:redis_secret_password
      - HTTP_USER=admin
      - HTTP_PASSWORD=admin
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - autopulse_network

volumes:
  postgres_data:
  redis_data:

networks:
  autopulse_network:
    driver: bridge
