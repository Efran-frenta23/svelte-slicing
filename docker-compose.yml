version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: autopulse_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: efran123
      POSTGRES_PASSWORD: abilahab
      POSTGRES_DB: autopulse
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U efran123 -d autopulse"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
